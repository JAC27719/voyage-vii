name: voyage-vii-dev

services:
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.7@sha256:d431d365a24d0d626f699169803812e08bb95fc19677ce032b6775150654aae6
    init: true
    entrypoint:
      - /bin/sh
    security_opt:
      # Development-only: TigerBeetle needs this local container exception.
      - seccomp=unconfined
    command:
      - -ceu
      - |
        if [ ! -f /var/lib/tigerbeetle/0_0.tigerbeetle ]; then
          /tigerbeetle format --replica=0 --replica-count=1 --development /var/lib/tigerbeetle/0_0.tigerbeetle
        fi
        exec /tigerbeetle start --addresses=0.0.0.0:3000 --cache-grid=128MiB --development /var/lib/tigerbeetle/0_0.tigerbeetle
    volumes:
      - tigerbeetle-data:/var/lib/tigerbeetle
    expose:
      - "3000"
    networks:
      - runtime
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/tigerbeetle/0_0.tigerbeetle"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    stop_grace_period: 10s

  api:
    image: ${VOYAGE_VII_API_IMAGE:?Set VOYAGE_VII_API_IMAGE to an exact API image pin like registry.example/voyage-vii-api:0.1.0@sha256:<64 hex chars>}
    init: true
    entrypoint:
      - voyage-vii-api
    command:
      - serve
      - --runtime
      - external
      - --runtime-root
      - /var/lib/voyage-vii/runtime
      - --data-root
      - /var/lib/voyage-vii/data
      - --allowed-origin
      - http://localhost:1420
      - --handshake
      - stdout-v1
      - --development-container
      - --listen
      - 0.0.0.0:7800
      - --advertised-api-url
      - http://127.0.0.1:7800
      - --sqlite-path
      - /var/lib/voyage-vii/data/sqlite/voyage-vii.sqlite3
      - --tigerbeetle-address
      - tigerbeetle:3000
    depends_on:
      tigerbeetle:
        condition: service_healthy
    ports:
      - "127.0.0.1:7800:7800"
    volumes:
      - api-data:/var/lib/voyage-vii/data
      - api-runtime:/var/lib/voyage-vii/runtime
    networks:
      - runtime
    healthcheck:
      test: ["CMD", "voyage-vii-api", "version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    logging:
      driver: "none"
    stop_grace_period: 20s

networks:
  runtime:
    internal: true

volumes:
  api-data:
  api-runtime:
  tigerbeetle-data:
