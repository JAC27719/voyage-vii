name: Deploy TigerBeetle

on:
  workflow_run:
    workflows: [Deploy foundation]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-tigerbeetle
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] ||
             ! git diff --quiet HEAD^ HEAD -- infra/stacks/tigerbeetle .github/workflows/deploy-tigerbeetle.yml; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       needs.changes.outputs.deploy == 'true')
    environment: dev
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TIGERBEETLE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
      - name: Plan TigerBeetle
        run: |
          terraform -chdir=infra/stacks/tigerbeetle init -backend-config="bucket=${TF_VAR_state_bucket}"
          terraform -chdir=infra/stacks/tigerbeetle plan -out=tfplan
          terraform -chdir=infra/stacks/tigerbeetle show -json tfplan > tigerbeetle-plan.json
      - name: Reject data-volume deletion
        run: |
          jq -e '
            [.resource_changes[]
              | select(.type == "aws_ebs_volume")
              | .change.actions
              | select(index("delete"))]
            | length == 0
          ' infra/stacks/tigerbeetle/tigerbeetle-plan.json
      - name: Apply TigerBeetle
        run: terraform -chdir=infra/stacks/tigerbeetle apply -auto-approve tfplan
      - name: Wait for instance checks
        run: |
          instance_id=$(terraform -chdir=infra/stacks/tigerbeetle output -raw instance_id)
          aws ec2 wait instance-status-ok --instance-ids "$instance_id"
          for attempt in $(seq 1 30); do
            if [ "$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$instance_id" \
              --query 'length(InstanceInformationList)' \
              --output text)" = "1" ]; then
              break
            fi
            sleep 10
          done
          command_id=$(aws ssm send-command \
            --instance-ids "$instance_id" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["systemctl is-active --quiet tigerbeetle"]' \
            --query 'Command.CommandId' \
            --output text)
          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$instance_id"
