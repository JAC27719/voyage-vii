name: Deploy API

on:
  workflow_run:
    workflows: [Deploy TigerBeetle]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-api
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ] &&
               [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            deployed=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
              --jq '[.jobs[] | select(.name == "deploy" and .conclusion == "success")] | length > 0')
            echo "deploy=$deployed" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    environment: dev
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      TF_VAR_image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_API_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
      - name: Wait for dependency state
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if aws s3api head-object \
              --bucket "$TF_VAR_state_bucket" \
              --key dev/postgres.tfstate >/dev/null 2>&1 &&
               aws s3api head-object \
              --bucket "$TF_VAR_state_bucket" \
              --key dev/tigerbeetle.tfstate >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::PostgreSQL or TigerBeetle Terraform state was not available after five minutes."
          exit 1
      - name: Read registry locations
        run: |
          terraform -chdir=infra/stacks/foundation init -backend-config="bucket=${TF_VAR_state_bucket}"
          api_repository=$(terraform -chdir=infra/stacks/foundation output -no-color -raw api_repository_url)
          seeder_repository=$(terraform -chdir=infra/stacks/foundation output -no-color -raw seeder_repository_url)
          if [ -z "$api_repository" ] || [ -z "$seeder_repository" ]; then
            echo "::error::Foundation state does not contain the required ECR repository outputs."
            exit 1
          fi
          {
            echo "API_REPOSITORY=$api_repository"
            echo "SEEDER_REPOSITORY=$seeder_repository"
          } >> "$GITHUB_ENV"
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push immutable images
        run: |
          docker build --target api --tag "${API_REPOSITORY}:${DEPLOY_SHA}" .
          docker build --target seeder --tag "${SEEDER_REPOSITORY}:${DEPLOY_SHA}" .
          docker push "${API_REPOSITORY}:${DEPLOY_SHA}"
          docker push "${SEEDER_REPOSITORY}:${DEPLOY_SHA}"
      - name: Deploy ECS and API Gateway
        run: |
          terraform -chdir=infra/stacks/api init -backend-config="bucket=${TF_VAR_state_bucket}"
          terraform -chdir=infra/stacks/api plan -out=tfplan
          terraform -chdir=infra/stacks/api apply -auto-approve tfplan
      - name: Wait for ECS stability
        run: |
          cluster=$(terraform -chdir=infra/stacks/api output -raw ecs_cluster_name)
          service=$(terraform -chdir=infra/stacks/api output -raw api_service_name)
          aws ecs wait services-stable --cluster "$cluster" --services "$service"
      - name: Smoke test dependencies
        run: |
          api_url=$(terraform -chdir=infra/stacks/api output -raw api_url)
          for attempt in $(seq 1 30); do
            if curl --fail --silent "${api_url}/status"; then
              exit 0
            fi
            sleep 10
          done
          exit 1
