name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/voyage-vii-v2
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  BUN_VERSION: "1.3.14"
  RUST_VERSION: "1.96.0"
  ZIG_VERSION: "0.15.2"
  TB_CLIENT_ZIG_VERSION: "0.14.1"
  POWERSHELL_TELEMETRY_OPTOUT: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  VSCMD_SKIP_SENDTELEMETRY: "1"

jobs:
  workflow-policy:
    name: Workflow Policy
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Preserve repository line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Audit workflow and dependency automation policy
        run: |
          $ErrorActionPreference = "Stop"
          $workflowFiles = Get-ChildItem -LiteralPath ".github/workflows" -Filter "*.yml" -File
          if (-not $workflowFiles) { throw "No workflow files found." }

          foreach ($file in $workflowFiles) {
            $text = Get-Content -Raw -LiteralPath $file.FullName
            $uses = [regex]::Matches($text, '(?m)^\s*uses:\s*([^@\s]+)@([^\s#]+)\s*$')
            foreach ($match in $uses) {
              $ref = $match.Groups[2].Value
              if ($ref -notmatch '^[0-9a-f]{40}$') {
                throw "Unpinned action reference in $($file.Name): $($match.Value)"
              }
            }
            $forbidden = @(
              [string]::Concat("terra", "form"),
              [string]::Concat("a", "ws"),
              [string]::Concat("de", "ploy"),
              [string]::Concat("notar", "ization"),
              [string]::Concat("sign", "ing")
            )
            foreach ($needle in $forbidden) {
              if ($text -match "(?i)\b$needle\b") {
                throw "Forbidden non-slice capability '$needle' appears in $($file.Name)."
              }
            }
            if ($text -match '(?im)^\s*secrets:') {
              throw "Workflow-level secrets block is not allowed."
            }
            if ($text -notmatch '(?m)^permissions:\s*\r?\n\s+contents:\s+read\s*$') {
              throw "$($file.Name) must keep read-only permissions."
            }
            $retentionLines = [regex]::Matches($text, '(?m)^\s*retention-days:\s*(\d+)\s*$')
            foreach ($retention in $retentionLines) {
              if ($retention.Groups[1].Value -ne "7") {
                throw "$($file.Name) contains an artifact retention other than seven days."
              }
            }
            $runnerLines = [regex]::Matches($text, '(?m)^\s*runs-on:\s*(.+)\s*$')
            foreach ($runner in $runnerLines) {
              if ($runner.Groups[1].Value -notmatch '(?i)windows') {
                throw "$($file.Name) contains a non-Windows current gate."
              }
            }
          }

          $dependabot = Get-Content -Raw -LiteralPath ".github/dependabot.yml"
          foreach ($ecosystem in @("github-actions", "npm", "cargo")) {
            if ($dependabot -notmatch [regex]::Escape("package-ecosystem: `"$ecosystem`"")) {
              throw "Dependabot is missing ecosystem $ecosystem."
            }
          }

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: workflow-policy-diagnostics
          path: |
            .github/workflows/*.yml
            .github/dependabot.yml
          retention-days: 7
          if-no-files-found: error

  unit:
    name: Static And Unit
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Preserve repository line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Set up Rust
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal
          rustup default $env:RUST_VERSION
          rustc --version
          cargo --version

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Stage verified runtime
        run: pwsh -NoProfile -File tools/runtime-staging/stage-runtime.ps1

      - name: Run desktop static checks
        working-directory: apps/desktop
        run: |
          bun run typecheck
          bun run lint
          bun run format-check

      - name: Run desktop Rust tests
        working-directory: apps/desktop/src-tauri
        run: rustup run $env:RUST_VERSION cargo test --locked

      - name: Run runtime staging tests
        run: pwsh -NoProfile -File tests/runtime-staging/run-tests.ps1

      - name: Run API Zig tests
        working-directory: services/api
        run: zig build test

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-diagnostics
          path: |
            tools/runtime-staging/reports/**
            apps/desktop/src-tauri/resources/runtime/manifest.inputs.json
          retention-days: 7
          if-no-files-found: ignore
