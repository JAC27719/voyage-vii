name: Seed dev data

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: seed-dev
  cancel-in-progress: false

jobs:
  seed:
    environment: dev
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_API_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
      - name: Read deployed task configuration
        run: |
          terraform -chdir=infra/stacks/api init -backend-config="bucket=${TF_VAR_state_bucket}"
          echo "CLUSTER=$(terraform -chdir=infra/stacks/api output -raw ecs_cluster_name)" >> "$GITHUB_ENV"
          echo "TASK_DEFINITION=$(terraform -chdir=infra/stacks/api output -raw seeder_task_definition_arn)" >> "$GITHUB_ENV"
          echo "SUBNETS=$(terraform -chdir=infra/stacks/api output -json application_subnet_ids | jq -r 'join(",")')" >> "$GITHUB_ENV"
          echo "SECURITY_GROUP=$(terraform -chdir=infra/stacks/api output -raw api_security_group_id)" >> "$GITHUB_ENV"
      - name: Run one-off seed task
        run: |
          task_arn=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)
          test "$task_arn" != "None"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$task_arn"
          exit_code=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          test "$exit_code" = "0"
