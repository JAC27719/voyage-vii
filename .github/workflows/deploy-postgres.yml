name: Deploy PostgreSQL

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-postgres
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] ||
             ! git diff --quiet HEAD^ HEAD -- infra/stacks/postgres .github/workflows/deploy-postgres.yml; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       needs.changes.outputs.deploy == 'true')
    environment: dev
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_POSTGRES_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
      - name: Plan PostgreSQL
        run: |
          terraform -chdir=infra/stacks/postgres init -backend-config="bucket=${TF_VAR_state_bucket}"
          terraform -chdir=infra/stacks/postgres plan -out=tfplan
          terraform -chdir=infra/stacks/postgres show -json tfplan > postgres-plan.json
      - name: Reject database replacement or deletion
        run: |
          jq -e '
            [.resource_changes[]
              | select(.type == "aws_db_instance")
              | .change.actions
              | select(index("delete"))]
            | length == 0
          ' infra/stacks/postgres/postgres-plan.json
      - name: Apply PostgreSQL
        run: terraform -chdir=infra/stacks/postgres apply -auto-approve tfplan
